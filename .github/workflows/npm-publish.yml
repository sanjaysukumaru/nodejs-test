name: CI/CD Pipeline - Node.js Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node.js (recommended way)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Run tests
      - name: Run tests
        run: npm test

      # 5. Build project
      - name: Build project
        run: npm run build

      # 6. Setup SSH key
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 7. Add server to known_hosts (FIX for your error)
      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # 8. Create remote directory (if not exists)
      - name: Prepare remote server
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
          "mkdir -p ~/node-app"

      # 9. Deploy files via SCP
      - name: Deploy application
        run: |
          scp -i ~/.ssh/id_rsa -r ./dist/* \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/node-app

      # 10. Install & restart app using PM2
      - name: Restart application
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ~/node-app
            npm install
            pm2 start index.js || pm2 restart all
            pm2 save
          EOF
